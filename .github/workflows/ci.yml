# =============================================================================
# CI — Integración continua (Req 13.3, design.md §5.9 / §11)
# -----------------------------------------------------------------------------
# Pipeline de calidad (Req 13.3): lint, type-check, tests (unit + property-based),
# build y auditoría de presupuesto (bundle). Corre en push a `main` y en cada PR.
#
# Deploy: el sitio se publica en **Netlify** mediante su integración con Git
# (build + deploy automáticos por commit/PR desde el dashboard de Netlify), por
# lo que NO hace falta un job de deploy aquí. La config de build vive en
# `netlify.toml`. Este workflow queda como gate de calidad (lint/types/tests/
# build/budget) independiente del deploy.
#
# Seguridad: `GH_TOKEN` es un secret de CI (design.md §2.4 / §15, Req 7.2). Solo
# se expone al step de build, donde el prebuild (`fetch-github.mjs`) lo consume.
# Si el secret no está presente (p. ej. PRs desde forks), el fetch degrada con
# gracia a la API pública y el build NO se rompe (Req 7.5).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Mínimos privilegios.
permissions:
  contents: read

# Un solo run por rama/PR: cancela ejecuciones obsoletas y ahorra minutos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · type-check · test · build · budget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # engines: >=20.3.0 (package.json)
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (astro check)
        run: npm run check

      - name: Tests (unit + property-based)
        run: npm test

      - name: Build (astro build)
        run: npm run build
        env:
          # Secret de CI únicamente; el prebuild fetch-github lo usa. Ausente => fallback.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Budget audit (bundle size)
        run: npm run audit:budget
