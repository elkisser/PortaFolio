<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Sebastián Kisser">
  <!-- Identidad nueva (design.md §4.3/§4.5): un único cálido (ámbar) sobre el
       lenguaje editorial. Tile ámbar + tinta oscura del acento, hairline de firma
       de 1px y monograma SK en geométrica display. Reemplaza el favicon viejo
       (amarillo #ffe600 / Arial) de la identidad anterior. -->
  <rect width="64" height="64" rx="14" fill="#e8b75c"/>
  <!-- Hairline de firma (1px) inset, coherente con --line del sistema. -->
  <rect x="3.5" y="3.5" width="57" height="57" rx="11" fill="none" stroke="#14110a" stroke-opacity="0.16" stroke-width="1"/>
  <!-- Monograma SK: geométrica display, tinta del acento (--amber-ink), tracking
       negativo de firma. Fallback a system-ui donde no exista Space Grotesk. -->
  <text x="32" y="33" fill="#14110a"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="700" letter-spacing="-2"
        text-anchor="middle" dominant-baseline="central">SK</text>
  <!-- Acento de índice editorial: tick mono ámbar-oscuro abajo a la derecha. -->
  <rect x="44" y="50" width="11" height="2.5" rx="1" fill="#14110a" fill-opacity="0.55"/>
</svg>
