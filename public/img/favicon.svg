<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Sebastián Kisser">
  <!-- Identidad nueva (design.md §4.3/§4.5): un único cálido (ámbar) + tinta del
       acento. Monograma SK. Robusto para el rasterizador de favicons: sin
       `dominant-baseline` (no soportado por todos), baseline explícita y fuente
       genérica (Arial/sans) para que renderice aunque no haya webfont. -->
  <rect width="64" height="64" rx="14" fill="#e8b75c"/>
  <text x="32" y="44" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34" font-weight="700" letter-spacing="-2"
        fill="#14110a">SK</text>
</svg>
