<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Yo No Fui: juego de detectives con casos criminales generados por IA">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <!-- Índice editorial -->
  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">04 — YO NO FUI</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">IA · INVESTIGACIÓN</text>

  <!-- Encabezado de expediente -->
  <text x="120" y="206" class="mono" font-size="20" fill="#a6a5a0">CASO #001</text>
  <g transform="rotate(-4 1320 196)">
    <rect x="1196" y="172" width="248" height="48" rx="4" fill="none" stroke="#d9613c" stroke-width="2"/>
    <text x="1320" y="204" class="mono" font-size="20" fill="#d9613c" text-anchor="middle">CONFIDENCIAL</text>
  </g>

  <!-- Declaración del caso -->
  <text x="120" y="300" class="display" font-size="58" fill="#f3f2ee">La verdad está</text>
  <text x="120" y="366" class="display" font-size="58" fill="#f3f2ee">en los <tspan fill="#e8b75c">detalles</tspan>.</text>

  <!-- Sospechosos (3) -->
  <text x="120" y="452" class="mono" font-size="20" fill="#a6a5a0">SOSPECHOSOS</text>

  <rect x="120" y="480" width="400" height="200" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <circle cx="180" cy="540" r="30" fill="#161619" stroke="rgba(255,255,255,0.18)"/>
  <text x="180" y="548" class="display" font-size="24" fill="#a6a5a0" text-anchor="middle">?</text>
  <text x="232" y="534" class="display" font-size="26" fill="#f3f2ee">El socio</text>
  <text x="232" y="568" class="mono" font-size="15" fill="#a6a5a0">MÓVIL: DEUDA</text>
  <text x="152" y="640" class="body" font-size="18" fill="#a6a5a0">Coartada débil entre</text>
  <text x="152" y="664" class="body" font-size="18" fill="#a6a5a0">las 22 y las 23 h.</text>

  <rect x="540" y="480" width="400" height="200" rx="8" fill="#101012" stroke="rgba(232,183,92,0.45)"/>
  <circle cx="600" cy="540" r="30" fill="#161619" stroke="#e8b75c"/>
  <text x="600" y="548" class="display" font-size="24" fill="#e8b75c" text-anchor="middle">?</text>
  <text x="652" y="534" class="display" font-size="26" fill="#f3f2ee">La heredera</text>
  <text x="652" y="568" class="mono" font-size="15" fill="#e8b75c">MÓVIL: HERENCIA</text>
  <text x="572" y="640" class="body" font-size="18" fill="#a6a5a0">Sus huellas en el</text>
  <text x="572" y="664" class="body" font-size="18" fill="#a6a5a0">arma. ¿Demasiado obvio?</text>

  <rect x="960" y="480" width="400" height="200" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <circle cx="1020" cy="540" r="30" fill="#161619" stroke="rgba(255,255,255,0.18)"/>
  <text x="1020" y="548" class="display" font-size="24" fill="#a6a5a0" text-anchor="middle">?</text>
  <text x="1072" y="534" class="display" font-size="26" fill="#f3f2ee">El mayordomo</text>
  <text x="1072" y="568" class="mono" font-size="15" fill="#a6a5a0">MÓVIL: VENGANZA</text>
  <text x="992" y="640" class="body" font-size="18" fill="#a6a5a0">Conocía la rutina</text>
  <text x="992" y="664" class="body" font-size="18" fill="#a6a5a0">de la víctima.</text>

  <!-- Panel de acción (derecha) -->
  <rect x="1380" y="480" width="100" height="200" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <text x="1430" y="520" class="mono" font-size="14" fill="#a6a5a0" text-anchor="middle">PISTAS</text>
  <text x="1430" y="548" class="display" font-size="28" fill="#f3f2ee" text-anchor="middle">7</text>
  <line x1="1400" y1="572" x2="1460" y2="572" stroke="rgba(255,255,255,0.1)"/>
  <text x="1430" y="604" class="mono" font-size="14" fill="#a6a5a0" text-anchor="middle">AYUDAS</text>
  <text x="1430" y="632" class="display" font-size="28" fill="#e8b75c" text-anchor="middle">3</text>

  <!-- Pie -->
  <text x="120" y="848" class="display" font-size="26" fill="#f3f2ee">Casos únicos generados por IA. Sin repeticiones.</text>
  <text x="1480" y="848" class="body" font-size="22" fill="#a6a5a0" text-anchor="end">Astro · React · OpenAI · Zustand</text>
</svg>
