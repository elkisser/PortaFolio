<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Validación de Yo No Fui: la salida del modelo se valida contra un esquema; lo coherente entra al estado en Zustand y lo inválido se descarta">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
    <marker id="ynf-arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0 0 L8 5 L0 10" fill="none" stroke="#a6a5a0" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="120" x2="1480" y2="120"/>
    <line x1="120" y1="780" x2="1480" y2="780"/>
  </g>

  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">04 — YO NO FUI</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">IA → ESTADO · VALIDACIÓN</text>

  <!-- 1: salida del modelo (JSON) -->
  <text x="120" y="232" class="mono" font-size="18" fill="#a6a5a0">SALIDA DEL MODELO</text>
  <rect x="120" y="256" width="360" height="360" rx="10" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
  <g class="mono" font-size="17" fill="#a6a5a0">
    <text x="148" y="300">{</text>
    <text x="172" y="334" fill="#f3f2ee">"caso": "#001",</text>
    <text x="172" y="368" fill="#f3f2ee">"culpable": "…",</text>
    <text x="172" y="402" fill="#f3f2ee">"sospechosos": [</text>
    <text x="196" y="436" fill="#a6a5a0">3 … 5 items</text>
    <text x="172" y="470" fill="#f3f2ee">],</text>
    <text x="172" y="504" fill="#f3f2ee">"pistas": [ … ]</text>
    <text x="148" y="538">}</text>
    <text x="148" y="586" fill="#d9613c">// texto no confiable</text>
  </g>

  <line x1="480" y1="436" x2="600" y2="436" stroke="#a6a5a0" stroke-width="2" marker-end="url(#ynf-arrow)"/>

  <!-- 2: validación de esquema -->
  <text x="620" y="232" class="mono" font-size="18" fill="#a6a5a0">VALIDACIÓN DE ESQUEMA</text>
  <rect x="620" y="336" width="320" height="200" rx="10" fill="#101012" stroke="#e8b75c" stroke-opacity="0.45"/>
  <text x="780" y="424" class="display" font-size="26" fill="#f3f2ee" text-anchor="middle">parse(schema)</text>
  <text x="780" y="462" class="mono" font-size="16" fill="#a6a5a0" text-anchor="middle">FORMA + TIPOS + REGLAS</text>

  <!-- bifurcación válido / inválido -->
  <path d="M940 400 L1040 320" fill="none" stroke="#5fd38a" stroke-width="2" marker-end="url(#ynf-arrow)"/>
  <path d="M940 472 L1040 560" fill="none" stroke="#d9613c" stroke-width="2" marker-end="url(#ynf-arrow)"/>

  <!-- 3a: válido -> estado Zustand -->
  <rect x="1060" y="256" width="380" height="150" rx="10" fill="#101012" stroke="rgba(95,211,138,0.5)"/>
  <circle cx="1096" cy="300" r="6" fill="#5fd38a"/>
  <text x="1116" y="306" class="mono" font-size="16" fill="#5fd38a">COHERENTE</text>
  <text x="1084" y="356" class="display" font-size="28" fill="#f3f2ee">Estado del juego</text>
  <text x="1084" y="388" class="mono" font-size="16" fill="#a6a5a0">ZUSTAND STORE</text>

  <!-- 3b: inválido -> descartado -->
  <rect x="1060" y="486" width="380" height="130" rx="10" fill="#101012" stroke="rgba(217,97,60,0.5)"/>
  <text x="1084" y="540" class="display" font-size="26" fill="#f3f2ee">Se descarta</text>
  <text x="1084" y="574" class="mono" font-size="16" fill="#d9613c">REINTENTA · NO ROMPE LA PARTIDA</text>

  <text x="120" y="848" class="body" font-size="22" fill="#a6a5a0">Solo lo que valida contra el esquema llega al estado: el caso nunca queda inconsistente.</text>
</svg>
