<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="LuminaEdit: eliminación de fondo con IA local usando TensorFlow.js y WebGL">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
    <pattern id="checker" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#15151a"/>
      <rect width="16" height="16" fill="#1d1d24"/>
      <rect x="16" y="16" width="16" height="16" fill="#1d1d24"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <!-- Índice editorial -->
  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">05 — LUMINAEDIT</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">IA · WEBGL</text>

  <!-- ANTES (original con fondo) -->
  <text x="120" y="208" class="mono" font-size="20" fill="#a6a5a0">ORIGINAL</text>
  <rect x="120" y="232" width="560" height="420" rx="10" fill="#2f5e7e"/>
  <rect x="120" y="232" width="560" height="420" rx="10" fill="none" stroke="rgba(255,255,255,0.09)"/>
  <circle cx="400" cy="360" r="74" fill="#caa17a"/>
  <rect x="318" y="452" width="164" height="170" rx="40" fill="#3a3f52"/>
  <text x="150" y="624" class="mono" font-size="16" fill="#f3f2ee">retrato.jpg · fondo sólido</text>

  <!-- Flecha de proceso -->
  <g transform="translate(712 432)">
    <circle r="36" fill="#e8b75c"/>
    <text y="11" class="display" font-size="34" fill="#14110a" text-anchor="middle">→</text>
  </g>

  <!-- DESPUÉS (fondo removido, transparencia) -->
  <text x="800" y="208" class="mono" font-size="20" fill="#e8b75c">FONDO ELIMINADO</text>
  <rect x="800" y="232" width="560" height="420" rx="10" fill="url(#checker)"/>
  <rect x="800" y="232" width="560" height="420" rx="10" fill="none" stroke="#e8b75c" stroke-opacity="0.5"/>
  <circle cx="1080" cy="360" r="74" fill="#caa17a"/>
  <rect x="998" y="452" width="164" height="170" rx="40" fill="#3a3f52"/>
  <text x="830" y="624" class="mono" font-size="16" fill="#f3f2ee">retrato.png · transparente</text>

  <!-- Panel de motor IA (derecha) -->
  <rect x="1396" y="232" width="84" height="420" rx="10" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <text x="1438" y="276" class="mono" font-size="13" fill="#a6a5a0" text-anchor="middle">MOTOR</text>
  <circle cx="1438" cy="330" r="6" fill="#5fd38a"/>
  <text x="1438" y="360" class="mono" font-size="12" fill="#f3f2ee" text-anchor="middle">TF.js</text>
  <circle cx="1438" cy="416" r="6" fill="#5fd38a"/>
  <text x="1438" y="446" class="mono" font-size="12" fill="#f3f2ee" text-anchor="middle">WebGL</text>
  <circle cx="1438" cy="502" r="6" fill="#5fd38a"/>
  <text x="1438" y="532" class="mono" font-size="12" fill="#f3f2ee" text-anchor="middle">OCR</text>
  <text x="1438" y="610" class="mono" font-size="12" fill="#e8b75c" text-anchor="middle">GPU</text>

  <!-- Pie -->
  <text x="120" y="848" class="display" font-size="26" fill="#f3f2ee">IA que elimina fondos sin salir del navegador.</text>
  <text x="1480" y="848" class="body" font-size="22" fill="#5fd38a" text-anchor="end">100% local · privacidad total</text>
</svg>
