<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="LuminaEdit: comparación antes y después de eliminar el fondo de una imagen con IA local">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
    <pattern id="checker" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#161619"/>
      <rect width="20" height="20" fill="#1d1d20"/>
      <rect x="20" y="20" width="20" height="20" fill="#1d1d20"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">05 — LUMINAEDIT</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">IA LOCAL · WEBGL</text>

  <!-- Antes -->
  <text x="120" y="206" class="mono" font-size="20" fill="#a6a5a0">ANTES</text>
  <rect x="120" y="230" width="640" height="440" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="144" y="254" width="592" height="392" rx="6" fill="#22323f"/>
  <circle cx="440" cy="430" r="120" fill="#1d1d20"/>
  <rect x="360" y="470" width="160" height="176" fill="#1d1d20"/>

  <!-- Después -->
  <text x="840" y="206" class="mono" font-size="20" fill="#a6a5a0">DESPUÉS</text>
  <rect x="840" y="230" width="640" height="440" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="864" y="254" width="592" height="392" rx="6" fill="url(#checker)"/>
  <circle cx="1160" cy="430" r="120" fill="#2b2b30"/>
  <rect x="1080" y="470" width="160" height="176" fill="#2b2b30"/>

  <!-- Indicador de privacidad / proceso local -->
  <rect x="120" y="700" width="1360" height="56" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <circle cx="156" cy="728" r="6" fill="#5fd38a"/>
  <text x="180" y="735" class="mono" font-size="18" fill="#5fd38a">PROCESADO EN TU DISPOSITIVO · 0 BYTES ENVIADOS</text>
  <text x="1448" y="735" class="mono" font-size="18" fill="#a6a5a0" text-anchor="end">TENSORFLOW.JS · WEBGL</text>

  <text x="120" y="848" class="mono" font-size="20" fill="#a6a5a0">SEGMENTACIÓN EN TIEMPO REAL, SIN SUBIR LA IMAGEN A NINGÚN SERVIDOR</text>
</svg>
