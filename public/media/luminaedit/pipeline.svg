<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="LuminaEdit: el pipeline de segmentación corre completo en el navegador con aceleración WebGL">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">05 — LUMINAEDIT</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">PIPELINE EN EL NAVEGADOR</text>

  <text x="120" y="220" class="mono" font-size="20" fill="#a6a5a0">TODO OCURRE EN EL CLIENTE</text>

  <g>
    <rect x="120" y="360" width="280" height="150" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <text x="260" y="430" class="display" font-size="24" fill="#f3f2ee" text-anchor="middle">Imagen</text>
    <text x="260" y="464" class="mono" font-size="15" fill="#a6a5a0" text-anchor="middle">en memoria</text>

    <rect x="480" y="360" width="280" height="150" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <text x="620" y="424" class="display" font-size="24" fill="#f3f2ee" text-anchor="middle">Modelo</text>
    <text x="620" y="458" class="mono" font-size="15" fill="#a6a5a0" text-anchor="middle">TensorFlow.js</text>
    <text x="620" y="484" class="mono" font-size="15" fill="#e8b75c" text-anchor="middle">backend WebGL</text>

    <rect x="840" y="360" width="280" height="150" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <text x="980" y="424" class="display" font-size="24" fill="#f3f2ee" text-anchor="middle">Máscara</text>
    <text x="980" y="458" class="mono" font-size="15" fill="#a6a5a0" text-anchor="middle">segmentación</text>

    <rect x="1200" y="360" width="280" height="150" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <text x="1340" y="424" class="display" font-size="24" fill="#f3f2ee" text-anchor="middle">PNG</text>
    <text x="1340" y="458" class="mono" font-size="15" fill="#a6a5a0" text-anchor="middle">fondo transparente</text>
    <text x="1340" y="484" class="mono" font-size="15" fill="#5fd38a" text-anchor="middle">descarga local</text>
  </g>

  <g stroke="#e8b75c" stroke-width="2" fill="none">
    <line x1="400" y1="435" x2="460" y2="435"/>
    <path d="M460 435 l-16 -8 v16 z" fill="#e8b75c" stroke="none"/>
    <line x1="760" y1="435" x2="820" y2="435"/>
    <path d="M820 435 l-16 -8 v16 z" fill="#e8b75c" stroke="none"/>
    <line x1="1120" y1="435" x2="1180" y2="435"/>
    <path d="M1180 435 l-16 -8 v16 z" fill="#e8b75c" stroke="none"/>
  </g>

  <rect x="120" y="620" width="1360" height="60" rx="6" fill="none" stroke="rgba(255,255,255,0.09)" stroke-dasharray="6 6"/>
  <text x="800" y="658" class="mono" font-size="18" fill="#5fd38a" text-anchor="middle">LÍMITE DEL DISPOSITIVO — NINGÚN DATO LO CRUZA</text>

  <text x="120" y="848" class="mono" font-size="20" fill="#a6a5a0">PRIVACIDAD POR DISEÑO: SIN BACKEND, SIN SUBIDAS</text>
</svg>
