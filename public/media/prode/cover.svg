<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Prode: prode de fútbol en tiempo real con predicciones y tabla de posiciones">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <!-- Rejilla tenue de firma -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <!-- Índice editorial -->
  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">02 — PRODE</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">REALTIME · FÚTBOL</text>

  <!-- Columna izquierda: predicciones de la fecha -->
  <text x="120" y="208" class="mono" font-size="20" fill="#a6a5a0">FECHA 12 · TUS PREDICCIONES</text>

  <!-- Partido 1 (EN VIVO) -->
  <rect x="120" y="240" width="820" height="118" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <circle cx="156" cy="268" r="5" fill="#5fd38a"/>
  <text x="176" y="274" class="mono" font-size="16" fill="#5fd38a">EN VIVO · 67'</text>
  <text x="152" y="330" class="display" font-size="34" fill="#f3f2ee">River</text>
  <rect x="430" y="296" width="56" height="48" rx="6" fill="#0a0a0b" stroke="#e8b75c"/>
  <text x="458" y="330" class="display" font-size="30" fill="#e8b75c" text-anchor="middle">2</text>
  <text x="500" y="330" class="mono" font-size="22" fill="#a6a5a0" text-anchor="middle">:</text>
  <rect x="514" y="296" width="56" height="48" rx="6" fill="#0a0a0b" stroke="rgba(255,255,255,0.18)"/>
  <text x="542" y="330" class="display" font-size="30" fill="#f3f2ee" text-anchor="middle">1</text>
  <text x="916" y="330" class="display" font-size="34" fill="#f3f2ee" text-anchor="end">Boca</text>

  <!-- Partido 2 (pendiente) -->
  <rect x="120" y="378" width="820" height="118" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <text x="156" y="412" class="mono" font-size="16" fill="#a6a5a0">SÁB 21:30</text>
  <text x="152" y="468" class="display" font-size="34" fill="#f3f2ee">Colón</text>
  <rect x="430" y="434" width="56" height="48" rx="6" fill="#0a0a0b" stroke="rgba(255,255,255,0.18)"/>
  <text x="458" y="468" class="display" font-size="30" fill="#f3f2ee" text-anchor="middle">1</text>
  <text x="500" y="468" class="mono" font-size="22" fill="#a6a5a0" text-anchor="middle">:</text>
  <rect x="514" y="434" width="56" height="48" rx="6" fill="#0a0a0b" stroke="rgba(255,255,255,0.18)"/>
  <text x="542" y="468" class="display" font-size="30" fill="#f3f2ee" text-anchor="middle">1</text>
  <text x="916" y="468" class="display" font-size="34" fill="#f3f2ee" text-anchor="end">Unión</text>

  <!-- Partido 3 (acertado) -->
  <rect x="120" y="516" width="820" height="118" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <text x="156" y="550" class="mono" font-size="16" fill="#a6a5a0">FINAL</text>
  <text x="892" y="550" class="mono" font-size="16" fill="#5fd38a" text-anchor="end">+3 PTS · ACERTASTE</text>
  <text x="152" y="606" class="display" font-size="34" fill="#f3f2ee">Racing</text>
  <rect x="430" y="572" width="56" height="48" rx="6" fill="#0a0a0b" stroke="rgba(95,211,138,0.5)"/>
  <text x="458" y="606" class="display" font-size="30" fill="#f3f2ee" text-anchor="middle">0</text>
  <text x="500" y="606" class="mono" font-size="22" fill="#a6a5a0" text-anchor="middle">:</text>
  <rect x="514" y="572" width="56" height="48" rx="6" fill="#0a0a0b" stroke="rgba(95,211,138,0.5)"/>
  <text x="542" y="606" class="display" font-size="30" fill="#f3f2ee" text-anchor="middle">0</text>
  <text x="916" y="606" class="display" font-size="34" fill="#f3f2ee" text-anchor="end">Independiente</text>

  <!-- Columna derecha: tabla de la liga privada -->
  <text x="1000" y="208" class="mono" font-size="20" fill="#a6a5a0">LIGA PRIVADA · TABLA</text>
  <rect x="1000" y="240" width="480" height="394" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>

  <g class="mono" font-size="20">
    <text x="1032" y="300" fill="#e8b75c">01</text>
    <text x="1080" y="300" class="body" fill="#f3f2ee">Seba</text>
    <text x="1448" y="300" fill="#e8b75c" text-anchor="end">128 PT</text>
    <line x1="1032" y1="324" x2="1448" y2="324" stroke="rgba(255,255,255,0.07)"/>

    <text x="1032" y="362" fill="#a6a5a0">02</text>
    <text x="1080" y="362" class="body" fill="#f3f2ee">Nico</text>
    <text x="1448" y="362" fill="#a6a5a0" text-anchor="end">121 PT</text>
    <line x1="1032" y1="386" x2="1448" y2="386" stroke="rgba(255,255,255,0.07)"/>

    <text x="1032" y="424" fill="#a6a5a0">03</text>
    <text x="1080" y="424" class="body" fill="#f3f2ee">Caro</text>
    <text x="1448" y="424" fill="#a6a5a0" text-anchor="end">117 PT</text>
    <line x1="1032" y1="448" x2="1448" y2="448" stroke="rgba(255,255,255,0.07)"/>

    <text x="1032" y="486" fill="#a6a5a0">04</text>
    <text x="1080" y="486" class="body" fill="#f3f2ee">Juli</text>
    <text x="1448" y="486" fill="#a6a5a0" text-anchor="end">110 PT</text>
    <line x1="1032" y1="510" x2="1448" y2="510" stroke="rgba(255,255,255,0.07)"/>

    <text x="1032" y="548" fill="#a6a5a0">05</text>
    <text x="1080" y="548" class="body" fill="#f3f2ee">Maxi</text>
    <text x="1448" y="548" fill="#a6a5a0" text-anchor="end">104 PT</text>
  </g>

  <rect x="1000" y="586" width="480" height="48" rx="6" fill="#e8b75c"/>
  <text x="1240" y="617" class="mono" font-size="18" fill="#14110a" text-anchor="middle">SISTEMA DE PUNTOS AUTOMÁTICO</text>

  <!-- Pie -->
  <text x="120" y="848" class="display" font-size="26" fill="#f3f2ee">Predice, gana y demuestra quién manda.</text>
  <text x="1480" y="848" class="body" font-size="22" fill="#a6a5a0" text-anchor="end">Supabase · APIs deportivas</text>
</svg>
