<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Interfaz de Chromora: panel de prompt, lienzo de paleta y exportación de tokens">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <!-- Marco de la app -->
  <rect x="80" y="80" width="1440" height="740" rx="10" fill="#101012" stroke="rgba(255,255,255,0.09)"/>

  <!-- Barra superior -->
  <line x1="80" y1="156" x2="1520" y2="156" stroke="rgba(255,255,255,0.09)"/>
  <circle cx="120" cy="118" r="7" fill="#d9613c"/>
  <circle cx="146" cy="118" r="7" fill="#e8b75c"/>
  <circle cx="172" cy="118" r="7" fill="#5fd38a"/>
  <text x="800" y="126" class="mono" font-size="20" fill="#a6a5a0" text-anchor="middle">chromora — playground</text>

  <!-- Sidebar -->
  <line x1="420" y1="156" x2="420" y2="820" stroke="rgba(255,255,255,0.09)"/>
  <text x="116" y="210" class="mono" font-size="18" fill="#a6a5a0">DESCRIPCIÓN</text>
  <rect x="116" y="232" width="268" height="120" rx="6" fill="#161619" stroke="rgba(255,255,255,0.09)"/>
  <text x="136" y="272" class="body" font-size="20" fill="#f3f2ee">atardecer sobre</text>
  <text x="136" y="302" class="body" font-size="20" fill="#f3f2ee">un mar en calma</text>

  <rect x="116" y="372" width="268" height="52" rx="6" fill="#e8b75c"/>
  <text x="250" y="406" class="display" font-size="22" fill="#14110a" text-anchor="middle">Generar paleta</text>

  <text x="116" y="486" class="mono" font-size="18" fill="#a6a5a0">EXPORTAR</text>
  <g class="mono" font-size="18" fill="#f3f2ee">
    <text x="116" y="524">— CSS tokens</text>
    <text x="116" y="556">— JSON</text>
    <text x="116" y="588">— SVG swatches</text>
  </g>

  <!-- Lienzo de paleta -->
  <text x="468" y="210" class="mono" font-size="18" fill="#a6a5a0">LIENZO</text>
  <g>
    <rect x="468" y="232" width="172" height="320" rx="6" fill="#10243f"/>
    <rect x="660" y="232" width="172" height="320" rx="6" fill="#2f5e7e"/>
    <rect x="852" y="232" width="172" height="320" rx="6" fill="#5d8aa3"/>
    <rect x="1044" y="232" width="172" height="320" rx="6" fill="#e8b75c"/>
    <rect x="1236" y="232" width="200" height="320" rx="6" fill="#d9613c"/>
  </g>

  <!-- Vista previa de UI con la paleta aplicada -->
  <text x="468" y="610" class="mono" font-size="18" fill="#a6a5a0">VISTA PREVIA</text>
  <rect x="468" y="632" width="968" height="156" rx="6" fill="#10243f"/>
  <text x="500" y="690" class="display" font-size="30" fill="#f3f2ee">Tu producto, con color con criterio</text>
  <rect x="500" y="712" width="190" height="48" rx="6" fill="#e8b75c"/>
  <text x="595" y="744" class="display" font-size="20" fill="#14110a" text-anchor="middle">Acción</text>
  <rect x="710" y="712" width="190" height="48" rx="6" fill="none" stroke="#f3f2ee"/>
  <text x="805" y="744" class="display" font-size="20" fill="#f3f2ee" text-anchor="middle">Secundaria</text>
</svg>
