<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="SoMoS: agencia digital que desarrolla experiencias web que venden">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <!-- Índice editorial -->
  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">06 — SOMOS</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">AGENCIA · ASTRO</text>

  <!-- Declaración de marca -->
  <text x="120" y="232" class="mono" font-size="20" fill="#a6a5a0">SOLUCIONES QUE GENERAN RESULTADOS</text>
  <text x="120" y="320" class="display" font-size="72" fill="#f3f2ee">Tu ventaja</text>
  <text x="120" y="404" class="display" font-size="72" fill="#e8b75c">competitiva.</text>
  <text x="120" y="470" class="body" font-size="26" fill="#a6a5a0">Experiencias digitales que venden: de tiendas</text>
  <text x="120" y="506" class="body" font-size="26" fill="#a6a5a0">online que convierten a marcas que enamoran.</text>

  <!-- Métricas (sin vanidad: capacidades) -->
  <g>
    <text x="120" y="606" class="display" font-size="48" fill="#f3f2ee">9+</text>
    <text x="120" y="640" class="mono" font-size="16" fill="#a6a5a0">PROYECTOS</text>
    <line x1="300" y1="566" x2="300" y2="648" stroke="rgba(255,255,255,0.1)"/>
    <text x="348" y="606" class="display" font-size="48" fill="#f3f2ee">6+</text>
    <text x="348" y="640" class="mono" font-size="16" fill="#a6a5a0">WEB APPS</text>
    <line x1="540" y1="566" x2="540" y2="648" stroke="rgba(255,255,255,0.1)"/>
    <text x="588" y="606" class="display" font-size="48" fill="#f3f2ee">3+</text>
    <text x="588" y="640" class="mono" font-size="16" fill="#a6a5a0">CLIENTES</text>
  </g>

  <!-- Trabajos destacados (columna derecha) -->
  <text x="960" y="208" class="mono" font-size="20" fill="#a6a5a0">TRABAJOS DESTACADOS</text>

  <rect x="960" y="236" width="520" height="120" rx="8" fill="#101012" stroke="rgba(232,183,92,0.45)"/>
  <rect x="984" y="260" width="72" height="72" rx="6" fill="#b9824f"/>
  <circle cx="1020" cy="296" r="22" fill="#8a5a2f"/>
  <text x="1080" y="292" class="display" font-size="26" fill="#f3f2ee">The Cookie Box</text>
  <text x="1080" y="324" class="mono" font-size="15" fill="#e8b75c">E-COMMERCE · DESTACADO</text>

  <rect x="960" y="372" width="520" height="120" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="984" y="396" width="72" height="72" rx="6" fill="#161619"/>
  <text x="1020" y="442" class="display" font-size="30" fill="#d9613c" text-anchor="middle">?</text>
  <text x="1080" y="428" class="display" font-size="26" fill="#f3f2ee">Yo No Fui</text>
  <text x="1080" y="460" class="mono" font-size="15" fill="#a6a5a0">REACT APP · IA</text>

  <rect x="960" y="508" width="520" height="120" rx="8" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="984" y="532" width="72" height="72" rx="6" fill="#2f5e7e"/>
  <text x="1020" y="578" class="display" font-size="26" fill="#f3f2ee" text-anchor="middle">{ }</text>
  <text x="1080" y="564" class="display" font-size="26" fill="#f3f2ee">Portfolios &amp; web</text>
  <text x="1080" y="596" class="mono" font-size="15" fill="#a6a5a0">DISEÑO + DESARROLLO</text>

  <!-- Pie -->
  <text x="120" y="848" class="display" font-size="26" fill="#f3f2ee">Tu partner tecnológico en Santa Fe.</text>
  <text x="1480" y="848" class="body" font-size="22" fill="#a6a5a0" text-anchor="end">Astro · React/Next · Symfony · Tailwind</text>
</svg>
