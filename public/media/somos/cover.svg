<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="SoMoS: portada editorial del sitio de una agencia de desarrollo digital">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">06 — SOMOS</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">FRONTEND · AGENCIA</text>

  <!-- Barra de navegación de la agencia -->
  <text x="120" y="206" class="mono" font-size="20" fill="#f3f2ee">SoMoS</text>
  <g class="mono" font-size="16" fill="#a6a5a0">
    <text x="1100" y="206">SERVICIOS</text>
    <text x="1250" y="206">TRABAJOS</text>
    <text x="1400" y="206">CONTACTO</text>
  </g>
  <line x1="120" y1="232" x2="1480" y2="232" stroke="rgba(255,255,255,0.09)"/>

  <!-- Titular editorial -->
  <text x="120" y="380" class="display" font-size="92" fill="#f3f2ee">Construimos</text>
  <text x="120" y="470" class="display" font-size="92" fill="#f3f2ee">productos <tspan fill="#e8b75c">digitales</tspan>.</text>
  <text x="120" y="540" class="body" font-size="26" fill="#a6a5a0">Estrategia, diseño y desarrollo para marcas que quieren crecer.</text>

  <!-- CTA -->
  <rect x="120" y="582" width="240" height="56" rx="6" fill="#e8b75c"/>
  <text x="240" y="618" class="mono" font-size="16" fill="#14110a" text-anchor="middle">EMPEZAR PROYECTO</text>

  <!-- Tarjetas de servicios -->
  <g>
    <rect x="120" y="690" width="420" height="60" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <text x="148" y="728" class="body" font-size="22" fill="#f3f2ee">Diseño de producto</text>
    <rect x="572" y="690" width="420" height="60" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <text x="600" y="728" class="body" font-size="22" fill="#f3f2ee">Desarrollo web</text>
    <rect x="1024" y="690" width="456" height="60" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <text x="1052" y="728" class="body" font-size="22" fill="#f3f2ee">Branding e identidad</text>
  </g>

  <text x="120" y="848" class="mono" font-size="20" fill="#5fd38a">TRANSICIONES Y MICROINTERACCIONES CON FRAMER MOTION</text>
  <text x="1480" y="848" class="body" font-size="22" fill="#a6a5a0" text-anchor="end">Astro 5 · React · TypeScript</text>
</svg>
