<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Grilla de trabajos de SoMoS: tienda online, landing de campaña, app de reservas y rediseño de marca, con islas React donde hay interacción">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="120" x2="1480" y2="120"/>
    <line x1="120" y1="780" x2="1480" y2="780"/>
  </g>

  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">06 — SOMOS</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">TRABAJOS · ISLAS REACT</text>

  <text x="120" y="196" class="display" font-size="34" fill="#f3f2ee">Trabajos destacados</text>
  <text x="120" y="232" class="mono" font-size="16" fill="#a6a5a0">HTML/ASTRO ESTÁTICO + ISLAS REACT DONDE HAY INTERACCIÓN</text>

  <!-- Card 1: Tienda online (interactiva → isla React) -->
  <rect x="120" y="270" width="640" height="220" rx="10" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
  <rect x="120" y="270" width="220" height="220" rx="10" fill="#b9824f"/>
  <circle cx="230" cy="380" r="56" fill="#8a5a2f"/>
  <text x="372" y="336" class="display" font-size="30" fill="#f3f2ee">Tienda online</text>
  <text x="372" y="372" class="body" font-size="20" fill="#a6a5a0">Catálogo + carrito + checkout</text>
  <rect x="372" y="404" width="150" height="40" rx="20" fill="#0a0a0b" stroke="rgba(232,183,92,0.6)"/>
  <text x="447" y="430" class="mono" font-size="14" fill="#e8b75c" text-anchor="middle">ISLA REACT</text>

  <!-- Card 2: Landing de campaña (estática) -->
  <rect x="788" y="270" width="640" height="220" rx="10" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
  <rect x="788" y="270" width="220" height="220" rx="10" fill="#2f5e7e"/>
  <rect x="828" y="320" width="140" height="18" rx="4" fill="#f3f2ee"/>
  <rect x="828" y="352" width="100" height="12" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="828" y="408" width="90" height="34" rx="6" fill="#e8b75c"/>
  <text x="1040" y="336" class="display" font-size="30" fill="#f3f2ee">Landing de campaña</text>
  <text x="1040" y="372" class="body" font-size="20" fill="#a6a5a0">Una pieza, un objetivo: convertir</text>
  <rect x="1040" y="404" width="150" height="40" rx="20" fill="#0a0a0b" stroke="rgba(255,255,255,0.18)"/>
  <text x="1115" y="430" class="mono" font-size="14" fill="#a6a5a0" text-anchor="middle">ESTÁTICA</text>

  <!-- Card 3: App de reservas (interactiva → isla React) -->
  <rect x="120" y="518" width="640" height="220" rx="10" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
  <rect x="120" y="518" width="220" height="220" rx="10" fill="#161619"/>
  <rect x="150" y="556" width="160" height="120" rx="6" fill="#0a0a0b" stroke="rgba(255,255,255,0.12)"/>
  <g fill="rgba(232,183,92,0.8)"><rect x="166" y="572" width="24" height="24" rx="3"/><rect x="198" y="572" width="24" height="24" rx="3"/></g>
  <g fill="rgba(255,255,255,0.2)"><rect x="230" y="572" width="24" height="24" rx="3"/><rect x="262" y="572" width="24" height="24" rx="3"/></g>
  <text x="372" y="584" class="display" font-size="30" fill="#f3f2ee">App de reservas</text>
  <text x="372" y="620" class="body" font-size="20" fill="#a6a5a0">Calendario y turnos en tiempo real</text>
  <rect x="372" y="652" width="150" height="40" rx="20" fill="#0a0a0b" stroke="rgba(232,183,92,0.6)"/>
  <text x="447" y="678" class="mono" font-size="14" fill="#e8b75c" text-anchor="middle">ISLA REACT</text>

  <!-- Card 4: Rediseño de marca (estática) -->
  <rect x="788" y="518" width="640" height="220" rx="10" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
  <rect x="788" y="518" width="220" height="220" rx="10" fill="#0a0a0b"/>
  <circle cx="898" cy="628" r="56" fill="none" stroke="#e8b75c" stroke-width="3"/>
  <text x="898" y="642" class="display" font-size="40" fill="#e8b75c" text-anchor="middle">S</text>
  <text x="1040" y="584" class="display" font-size="30" fill="#f3f2ee">Rediseño de marca</text>
  <text x="1040" y="620" class="body" font-size="20" fill="#a6a5a0">Identidad, logo y guías de uso</text>
  <rect x="1040" y="652" width="150" height="40" rx="20" fill="#0a0a0b" stroke="rgba(255,255,255,0.18)"/>
  <text x="1115" y="678" class="mono" font-size="14" fill="#a6a5a0" text-anchor="middle">BRANDING</text>

  <text x="120" y="848" class="body" font-size="22" fill="#a6a5a0">Cada proyecto hidrata JS solo donde hay interacción real.</text>
</svg>
