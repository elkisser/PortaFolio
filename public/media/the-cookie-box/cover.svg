<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="The Cookie Box: tienda de cookies artesanales de Santa Fe con catálogo y carrito">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <!-- Índice editorial -->
  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">03 — THE COOKIE BOX</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">E-COMMERCE · SANTA FE</text>

  <!-- Barra de tienda con carrito -->
  <text x="120" y="206" class="display" font-size="30" fill="#f3f2ee">Cookies artesanales</text>
  <g>
    <rect x="1306" y="178" width="174" height="44" rx="22" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
    <circle cx="1342" cy="200" r="7" fill="none" stroke="#f3f2ee" stroke-width="2"/>
    <path d="M1335 192 h14 l-2 14 h-10 z" fill="none" stroke="#f3f2ee" stroke-width="2"/>
    <text x="1366" y="206" class="mono" font-size="16" fill="#f3f2ee">CARRITO</text>
    <circle cx="1462" cy="190" r="11" fill="#e8b75c"/>
    <text x="1462" y="196" class="mono" font-size="14" fill="#14110a" text-anchor="middle">3</text>
  </g>

  <!-- Catálogo: 4 cards de producto (tonos cálidos de cookie) -->
  <!-- Card 1: Dulce de Leche -->
  <rect x="120" y="250" width="316" height="430" rx="10" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="120" y="250" width="316" height="250" rx="10" fill="#b9824f"/>
  <circle cx="278" cy="375" r="78" fill="#8a5a2f"/>
  <circle cx="248" cy="350" r="9" fill="#5b3a1c"/><circle cx="305" cy="362" r="9" fill="#5b3a1c"/><circle cx="270" cy="405" r="9" fill="#5b3a1c"/>
  <text x="144" y="556" class="display" font-size="26" fill="#f3f2ee">Dulce de Leche</text>
  <text x="144" y="592" class="mono" font-size="16" fill="#a6a5a0">CRUMBLE</text>
  <text x="412" y="592" class="display" font-size="24" fill="#e8b75c" text-anchor="end">$2.500</text>
  <rect x="144" y="618" width="268" height="44" rx="6" fill="#e8b75c"/>
  <text x="278" y="647" class="mono" font-size="16" fill="#14110a" text-anchor="middle">AGREGAR</text>

  <!-- Card 2: Nutella -->
  <rect x="456" y="250" width="316" height="430" rx="10" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="456" y="250" width="316" height="250" rx="10" fill="#6f4326"/>
  <circle cx="614" cy="375" r="78" fill="#4a2c17"/>
  <circle cx="584" cy="350" r="9" fill="#2c180c"/><circle cx="641" cy="362" r="9" fill="#2c180c"/><circle cx="606" cy="405" r="9" fill="#2c180c"/>
  <text x="480" y="556" class="display" font-size="26" fill="#f3f2ee">Nutella</text>
  <text x="480" y="592" class="mono" font-size="16" fill="#a6a5a0">CRUMBLE</text>
  <text x="748" y="592" class="display" font-size="24" fill="#e8b75c" text-anchor="end">$2.700</text>
  <rect x="480" y="618" width="268" height="44" rx="6" fill="#0a0a0b" stroke="#e8b75c"/>
  <text x="614" y="647" class="mono" font-size="16" fill="#e8b75c" text-anchor="middle">AGREGAR</text>

  <!-- Card 3: Oreo -->
  <rect x="792" y="250" width="316" height="430" rx="10" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="792" y="250" width="316" height="250" rx="10" fill="#e7e3da"/>
  <circle cx="950" cy="375" r="78" fill="#2a2a2e"/>
  <circle cx="920" cy="350" r="9" fill="#0f0f12"/><circle cx="977" cy="362" r="9" fill="#0f0f12"/><circle cx="942" cy="405" r="9" fill="#0f0f12"/>
  <text x="816" y="556" class="display" font-size="26" fill="#f3f2ee">Oreo</text>
  <text x="816" y="592" class="mono" font-size="16" fill="#a6a5a0">CRUMBLE</text>
  <text x="1084" y="592" class="display" font-size="24" fill="#e8b75c" text-anchor="end">$2.700</text>
  <rect x="816" y="618" width="268" height="44" rx="6" fill="#0a0a0b" stroke="#e8b75c"/>
  <text x="950" y="647" class="mono" font-size="16" fill="#e8b75c" text-anchor="middle">AGREGAR</text>

  <!-- Card 4: Frutos Rojos -->
  <rect x="1128" y="250" width="352" height="430" rx="10" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <rect x="1128" y="250" width="352" height="250" rx="10" fill="#c8746f"/>
  <circle cx="1304" cy="375" r="78" fill="#8c3b3f"/>
  <circle cx="1274" cy="350" r="9" fill="#5a1f27"/><circle cx="1331" cy="362" r="9" fill="#5a1f27"/><circle cx="1296" cy="405" r="9" fill="#5a1f27"/>
  <text x="1152" y="556" class="display" font-size="26" fill="#f3f2ee">Frutos Rojos</text>
  <text x="1152" y="592" class="mono" font-size="16" fill="#a6a5a0">CRUMBLE</text>
  <text x="1456" y="592" class="display" font-size="24" fill="#e8b75c" text-anchor="end">$2.800</text>
  <rect x="1152" y="618" width="304" height="44" rx="6" fill="#0a0a0b" stroke="#e8b75c"/>
  <text x="1304" y="647" class="mono" font-size="16" fill="#e8b75c" text-anchor="middle">AGREGAR</text>

  <!-- Pie -->
  <text x="120" y="848" class="display" font-size="26" fill="#f3f2ee">Las mejores cookies artesanales de Santa Fe.</text>
  <text x="1480" y="848" class="body" font-size="22" fill="#a6a5a0" text-anchor="end">React · Vite · Tailwind · panel admin</text>
</svg>
