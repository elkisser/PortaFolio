<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="The Cookie Box: catálogo filtrable de productos artesanales con carrito animado">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>

  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
  </g>

  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">03 — THE COOKIE BOX</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">E-COMMERCE · FRONTEND</text>

  <!-- Filtros -->
  <text x="120" y="206" class="mono" font-size="20" fill="#a6a5a0">CATÁLOGO · FILTROS</text>
  <g>
    <rect x="120" y="226" width="150" height="44" rx="6" fill="#e8b75c"/>
    <text x="195" y="254" class="mono" font-size="16" fill="#14110a" text-anchor="middle">TODO</text>
    <rect x="286" y="226" width="170" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.09)"/>
    <text x="371" y="254" class="mono" font-size="16" fill="#a6a5a0" text-anchor="middle">CLÁSICAS</text>
    <rect x="472" y="226" width="170" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.09)"/>
    <text x="557" y="254" class="mono" font-size="16" fill="#a6a5a0" text-anchor="middle">RELLENAS</text>
    <rect x="658" y="226" width="150" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.09)"/>
    <text x="733" y="254" class="mono" font-size="16" fill="#a6a5a0" text-anchor="middle">VEGANAS</text>
  </g>

  <!-- Grilla de productos -->
  <g>
    <rect x="120" y="306" width="300" height="320" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <rect x="144" y="330" width="252" height="200" rx="6" fill="#161619"/>
    <circle cx="270" cy="430" r="58" fill="#1d1d20"/>
    <text x="144" y="566" class="body" font-size="22" fill="#f3f2ee">Chip clásica</text>
    <text x="144" y="600" class="mono" font-size="18" fill="#e8b75c">$ 1.800</text>

    <rect x="450" y="306" width="300" height="320" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <rect x="474" y="330" width="252" height="200" rx="6" fill="#161619"/>
    <circle cx="600" cy="430" r="58" fill="#1d1d20"/>
    <text x="474" y="566" class="body" font-size="22" fill="#f3f2ee">Rellena dulce de leche</text>
    <text x="474" y="600" class="mono" font-size="18" fill="#e8b75c">$ 2.200</text>

    <rect x="780" y="306" width="300" height="320" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
    <rect x="804" y="330" width="252" height="200" rx="6" fill="#161619"/>
    <circle cx="930" cy="430" r="58" fill="#1d1d20"/>
    <text x="804" y="566" class="body" font-size="22" fill="#f3f2ee">Vegana de avena</text>
    <text x="804" y="600" class="mono" font-size="18" fill="#e8b75c">$ 2.000</text>
  </g>

  <!-- Carrito -->
  <rect x="1120" y="306" width="360" height="320" rx="6" fill="#101012" stroke="rgba(255,255,255,0.09)"/>
  <text x="1152" y="354" class="mono" font-size="18" fill="#a6a5a0">CARRITO · 3</text>
  <line x1="1152" y1="376" x2="1448" y2="376" stroke="rgba(255,255,255,0.09)"/>
  <g class="body" font-size="20" fill="#f3f2ee">
    <text x="1152" y="420">Chip clásica ×2</text><text x="1448" y="420" class="mono" fill="#a6a5a0" text-anchor="end">$3.600</text>
    <text x="1152" y="462">Vegana de avena</text><text x="1448" y="462" class="mono" fill="#a6a5a0" text-anchor="end">$2.000</text>
  </g>
  <line x1="1152" y1="500" x2="1448" y2="500" stroke="rgba(255,255,255,0.09)"/>
  <text x="1152" y="544" class="mono" font-size="20" fill="#f3f2ee">TOTAL</text>
  <text x="1448" y="544" class="mono" font-size="20" fill="#e8b75c" text-anchor="end">$5.600</text>
  <rect x="1152" y="566" width="296" height="44" rx="6" fill="#5fd38a"/>
  <text x="1300" y="594" class="mono" font-size="16" fill="#0a0a0b" text-anchor="middle">PEDIR POR WHATSAPP</text>

  <text x="120" y="848" class="mono" font-size="20" fill="#5fd38a">CONVERSIÓN AUTOMÁTICA A WEBP</text>
  <text x="1480" y="848" class="body" font-size="22" fill="#a6a5a0" text-anchor="end">React · Vite · Firebase</text>
</svg>
