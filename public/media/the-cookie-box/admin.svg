<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Panel de administración de The Cookie Box: alta de producto, carga de imagen con conversión a WebP y vista previa de la tarjeta">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.08em; }
      .display { font-family: "Space Grotesk", system-ui, sans-serif; }
      .body { font-family: "Inter", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0b"/>
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="120" y1="120" x2="1480" y2="120"/>
    <line x1="120" y1="780" x2="1480" y2="780"/>
  </g>

  <text x="120" y="92" class="mono" font-size="22" fill="#a6a5a0">03 — THE COOKIE BOX</text>
  <text x="1480" y="92" class="mono" font-size="22" fill="#e8b75c" text-anchor="end">PANEL ADMIN · FIREBASE AUTH</text>

  <!-- Formulario de nuevo producto (izquierda) -->
  <text x="120" y="200" class="mono" font-size="18" fill="#a6a5a0">NUEVO PRODUCTO</text>
  <g>
    <rect x="120" y="224" width="440" height="56" rx="6" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
    <text x="144" y="259" class="body" font-size="22" fill="#f3f2ee">Cookie Dulce de Leche</text>
    <rect x="120" y="296" width="210" height="56" rx="6" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
    <text x="144" y="331" class="body" font-size="22" fill="#f3f2ee">$2.500</text>
    <rect x="350" y="296" width="210" height="56" rx="6" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
    <text x="374" y="331" class="body" font-size="22" fill="#a6a5a0">Crumble ▾</text>
    <rect x="120" y="368" width="440" height="120" rx="6" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
    <text x="144" y="404" class="body" font-size="20" fill="#a6a5a0">Descripción…</text>
    <rect x="120" y="512" width="440" height="52" rx="6" fill="#e8b75c"/>
    <text x="340" y="546" class="mono" font-size="18" fill="#14110a" text-anchor="middle">GUARDAR PRODUCTO</text>
  </g>

  <!-- Dropzone con conversión a WebP (centro) -->
  <text x="612" y="200" class="mono" font-size="18" fill="#a6a5a0">IMAGEN</text>
  <rect x="612" y="224" width="420" height="340" rx="10" fill="#0d0d0f" stroke="#e8b75c" stroke-opacity="0.4" stroke-dasharray="8 8"/>
  <g transform="translate(822 360)">
    <path d="M-26 18 L0 -14 L26 18" fill="none" stroke="#e8b75c" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="0" y1="-14" x2="0" y2="40" stroke="#e8b75c" stroke-width="2.5"/>
  </g>
  <text x="822" y="448" class="body" font-size="22" fill="#f3f2ee" text-anchor="middle">Arrastrá la imagen</text>
  <rect x="700" y="486" width="244" height="44" rx="22" fill="#101012" stroke="rgba(95,211,138,0.5)"/>
  <circle cx="726" cy="508" r="5" fill="#5fd38a"/>
  <text x="744" y="514" class="mono" font-size="15" fill="#5fd38a">CONVERSIÓN AUTO → WEBP</text>

  <!-- Vista previa de la tarjeta (derecha) -->
  <text x="1084" y="200" class="mono" font-size="18" fill="#a6a5a0">VISTA PREVIA</text>
  <rect x="1084" y="224" width="296" height="400" rx="10" fill="#101012" stroke="rgba(255,255,255,0.12)"/>
  <rect x="1084" y="224" width="296" height="220" rx="10" fill="#b9824f"/>
  <circle cx="1232" cy="334" r="66" fill="#8a5a2f"/>
  <circle cx="1206" cy="312" r="8" fill="#5b3a1c"/><circle cx="1256" cy="322" r="8" fill="#5b3a1c"/><circle cx="1226" cy="360" r="8" fill="#5b3a1c"/>
  <text x="1108" y="496" class="display" font-size="24" fill="#f3f2ee">Dulce de Leche</text>
  <text x="1108" y="530" class="mono" font-size="15" fill="#a6a5a0">CRUMBLE</text>
  <text x="1356" y="530" class="display" font-size="22" fill="#e8b75c" text-anchor="end">$2.500</text>
  <rect x="1108" y="554" width="248" height="44" rx="6" fill="#e8b75c"/>
  <text x="1232" y="583" class="mono" font-size="15" fill="#14110a" text-anchor="middle">AGREGAR</text>

  <text x="120" y="848" class="body" font-size="22" fill="#a6a5a0">Alta/baja y edición con vista previa en vivo; imágenes a WebP en el navegador.</text>
</svg>
